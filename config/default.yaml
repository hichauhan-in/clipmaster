# ClipMaster default configuration.
# Do NOT edit this file for machine-specific tweaks. Instead create `config/local.yaml`
# (git-ignored) or pass `--config path/to.yaml`. Values here are safe defaults.

# Root working directory. Every processed video becomes a "project" folder underneath
# this path, holding its chunks, extracted audio, transcript, analysis and renders.
workspace_dir: "workspace"

# ------------------------------------------------------------------------------------
# Media / chunking
# ------------------------------------------------------------------------------------
media:
  # ffmpeg / ffprobe executables. Leave as bare names to use the ones on PATH.
  ffmpeg_bin: "ffmpeg"
  ffprobe_bin: "ffprobe"

chunking:
  # Hard ceiling for a single processing unit. Videos longer than this are split into
  # N evenly sized chunks where N = ceil(duration / max_chunk_seconds).
  #   30 min -> 2 chunks of 15 min
  #   40 min -> 2 chunks of 20 min
  #   50 min -> 3 chunks of ~16.7 min
  max_chunk_seconds: 1200        # 20 minutes
  # Overlap between adjacent chunks so a sentence spanning a boundary is not lost.
  # Overlapping segments are de-duplicated when chunks are merged back together.
  overlap_seconds: 2.0

# ------------------------------------------------------------------------------------
# Silence detection (ffmpeg silencedetect) — used by analysis and cleanup.
# ------------------------------------------------------------------------------------
silence:
  # Threshold below which audio is considered silent.
  noise_db: -30.0                # dB
  # Minimum length of a silent stretch to report.
  min_silence_seconds: 0.6

# ------------------------------------------------------------------------------------
# Transcription
# ------------------------------------------------------------------------------------
transcription:
  provider: "faster_whisper"     # pluggable; see clipmaster/transcription
  model: "small"                 # tiny | base | small | medium | large-v3
  language: null                 # null = auto-detect, or e.g. "en"
  device: "cpu"                  # cpu | cuda  (AMD-on-Windows GPU: see README)
  compute_type: "int8"           # int8 | int8_float16 | float16 | float32
  beam_size: 5
  vad_filter: true               # drop non-speech regions before decoding
  word_timestamps: true

# ------------------------------------------------------------------------------------
# LLM analysis via local Ollama (http://localhost:11434)
# ------------------------------------------------------------------------------------
llm:
  host: "http://localhost:11434"
  model: "llama3.1:8b"           # any chat model you've pulled in Ollama
  # Vision model for on-screen keyframe understanding (slides, demos, code, labs).
  vision_model: "qwen2.5vl:7b"
  temperature: 0.2
  # Max transcript characters handed to the model in a single analysis call.
  # Chunks larger than this are further windowed internally.
  max_input_chars: 12000
  request_timeout_seconds: 300

# ------------------------------------------------------------------------------------
# Analysis heuristics (used alongside the LLM to keep results grounded)
# ------------------------------------------------------------------------------------
analysis:
  # Words treated as fillers when scoring segments.
  filler_words:
    - "um"
    - "uh"
    - "erm"
    - "you know"
    - "like"
    - "basically"
    - "actually"
    - "sort of"
    - "kind of"
    - "i mean"
  # A segment whose importance score (0..1) is below this is suggested for removal
  # in the cleanup edit-decision-list.
  keep_importance_threshold: 0.35

  # Self-promotion / advertising removal. Spans the analysis flags as promotional
  # (course/product plugs, sponsor reads, like/subscribe/follow CTAs, discount or
  # coupon codes, "link in the description/bio", merch, Patreon) are cut from the
  # cleaned video even when a slide is on screen. promo_phrases is a deterministic
  # fallback so obvious promos are caught without the LLM.
  remove_promotional: true
  promo_phrases:
    # High-precision multi-word phrases so ordinary technical terms ("subscribe"
    # to a topic, certificate "enrollment", SQL "join") are not misflagged — the
    # LLM catches the nuanced cases via promo_spans.
    - "like and subscribe"
    - "please subscribe"
    - "don't forget to subscribe"
    - "subscribe to the channel"
    - "subscribe to my channel"
    - "hit the subscribe"
    - "hit the like"
    - "smash the like"
    - "like the video"
    - "ring the bell"
    - "notification bell"
    - "link in the description"
    - "link in the bio"
    - "link in the comments"
    - "link down below"
    - "check out my course"
    - "check out my courses"
    - "check out our course"
    - "my udemy"
    - "coupon code"
    - "discount code"
    - "promo code"
    - "sponsored by"
    - "this video is sponsored"
    - "today's sponsor"
    - "our sponsor"
    - "buy my"
    - "my patreon"
    - "support me on patreon"
    - "follow me on"
    - "sign up for my"
    - "join my discord"
    - "join my channel"
    # Outro / playlist / next-video plugs (the wrap-up self-promotion at the end).
    - "consider subscribing"
    - "in my playlist"
    - "on my playlist"
    - "my playlist"
    - "in the playlist"
    - "associated lessons"
    - "related lessons"
    - "check out my other"
    - "my other videos"
    - "my other tutorials"
    - "rest of the series"
    - "thanks for watching"
    - "thank you for watching"
    - "see you in the next"
    - "see you next time"
    - "catch you in the next"

  # Multi-factor scoring. The transcript is the primary signal (~60%), complemented
  # by audio delivery and on-screen visual content. Weights are relative and are
  # renormalised when a signal is unavailable.
  weights:
    transcript: 0.6
    audio: 0.2
    visual: 0.2
  audio_enabled: true            # loudness / speech-rate / pause DSP (needs numpy)
  visual_enabled: true           # keyframe understanding via the vision model

  # Visual sampling: at least one keyframe every N seconds plus each scene change,
  # capped at visual_max_frames vision-model calls to bound processing time.
  visual_sample_seconds: 25.0
  visual_max_frames: 40
  visual_scene_threshold: 0.4    # ffmpeg scene-change sensitivity (0..1)

  # On-screen teaching content is never dropped for lack of speech: these kinds get
  # an importance floor so cleanup keeps presentations, demos, code and lab footage.
  visual_floor_importance: 0.6
  visual_informative_kinds:
    - "presentation"
    - "screen_demo"
    - "code_terminal"
    - "lab_hardware"
    - "diagram_chart"

  # Silent-but-active footage (navigating a UI, showing how to reach a place) is
  # kept: this many seconds around each informative on-screen keyframe survive
  # cleanup even when nobody is talking over it.
  visual_keep_pad_seconds: 2.0

# ------------------------------------------------------------------------------------
# Shorts / clip generation defaults
# ------------------------------------------------------------------------------------
clips:
  max_duration_seconds: 30       # soft maximum length of a generated short
  min_duration_seconds: 8
  target_count: 6                # how many candidate clips to surface

# ------------------------------------------------------------------------------------
# Render defaults for the cleanup / shorts actions (ffmpeg encoding + framing)
# ------------------------------------------------------------------------------------
render:
  video_codec: "libx264"
  preset: "veryfast"
  crf: 20                        # lower = better quality / bigger file
  audio_codec: "aac"
  audio_bitrate: "160k"
  # Vertical short-form canvas (9:16). Source frames are letterboxed onto a
  # blurred fill of themselves so nothing is cropped off educational content.
  shorts_width: 1080
  shorts_height: 1920
  shorts_blur_background: true
  # Cleanup smoothing: keep tiny silences (natural pauses) and fade across big cuts
  # so the cleaned cut stays smooth instead of glitching between segments.
  cleanup_keep_gap_seconds: 1.2      # silences shorter than this are kept, not cut
  cleanup_smooth_cuts: true          # fade across big removed gaps + fade in the open
  cleanup_fade_seconds: 0.3          # fade duration at a smoothed cut
  cleanup_fade_min_gap_seconds: 5.0  # only fade when at least this many seconds were removed

# ------------------------------------------------------------------------------------
# Study-notes generation (Notes action)
# ------------------------------------------------------------------------------------
notes:
  # Consecutive chapters are grouped into one Markdown file, so a video produces
  # a handful of long, readable notes files instead of dozens of tiny ones.
  chapters_per_file: 4
  # At or below this many chapters, write everything into a single notes file.
  single_file_max_chapters: 6

# ------------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------------
logging:
  level: "INFO"                  # DEBUG | INFO | WARNING | ERROR
  # Optional log file or directory. null = console only. The desktop app's
  # Diagnostics tab writes the chosen path here (into config/local.yaml).
  file: null
